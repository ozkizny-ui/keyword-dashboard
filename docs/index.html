<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오즈키즈 키워드 대시보드</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
/* ── RESET & TOKENS ─────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F5F8; --surface:#FFFFFF; --surface2:#F0F0F7;
  --border:rgba(107,95,228,.12); --border2:rgba(107,95,228,.2);
  --accent:#7B6FE8; --accent-d:#5A4FD4; --accent-l:#EDEAFD;
  --red:#E05252; --red-l:#FDEDEB; --blue:#3B7DE0; --blue-l:#EAF1FD;
  --green:#2DA882; --green-l:#E3F5EF; --amber:#D97706; --amber-l:#FEF3C7;
  --text:#18172E; --muted:#8A88A8;
  --shadow:0 1px 3px rgba(107,95,228,.08),0 4px 16px rgba(107,95,228,.06);
}
html,body{background:var(--bg);color:var(--text);
  font-family:Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
a{color:inherit}

/* ── LAYOUT ─────────────────────────────────────────────────── */
.app{display:flex;min-height:100vh}
.sidebar{width:210px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
  padding:20px 12px;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.brand{font-size:1.15rem;font-weight:800;color:var(--accent-d);letter-spacing:-.02em;
  padding:4px 8px 16px;display:flex;align-items:center;gap:8px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:10px;border:none;
  background:transparent;width:100%;text-align:left;font-size:.86rem;font-weight:600;color:var(--muted);transition:.12s}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-l);color:var(--accent-d)}
.sidebar-foot{margin-top:auto;font-size:.66rem;color:var(--muted);padding:8px;line-height:1.6}
.sidebar-foot .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:5px}

.main{flex:1;min-width:0;padding:24px 28px 60px;max-width:1500px}
.page-head h1{font-size:clamp(1.1rem,3vw,1.5rem);font-weight:800;letter-spacing:-.03em}
.page-head .sub{font-size:.74rem;color:var(--muted);margin-top:3px}
.page-head .sub b{color:#64748b}

/* ── CARDS / SECTIONS ───────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:18px 20px;box-shadow:var(--shadow);margin-top:18px}
.card-title{font-size:.92rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}.sidebar{width:64px}.brand span,.nav-item span.lbl{display:none}}

/* ── FILTERS ────────────────────────────────────────────────── */
.filters{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:18px}
@media(max-width:900px){.filters{grid-template-columns:1fr 1fr}}
.filter label{display:block;font-size:.72rem;font-weight:600;color:var(--muted);margin-bottom:5px}
.filter select,.filter input{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:9px;
  background:var(--surface);font-size:.82rem;color:var(--text);outline:none}
.filter select[multiple]{height:auto;min-height:38px}
.filter input:focus,.filter select:focus{border-color:var(--accent)}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.chip{font-size:.68rem;background:var(--accent-l);color:var(--accent-d);padding:2px 8px;border-radius:20px;
  display:inline-flex;gap:4px;align-items:center}
.chip b{cursor:pointer}

/* ── TABLES ─────────────────────────────────────────────────── */
.tbl-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
table{border-collapse:collapse;width:100%;font-size:.8rem}
thead th{background:var(--surface2);color:var(--muted);font-weight:700;text-align:right;
  padding:9px 12px;position:sticky;top:0;white-space:nowrap}
thead th:first-child,thead th.lcell{text-align:left}
tbody td{padding:8px 12px;text-align:right;border-top:1px solid var(--border);white-space:nowrap}
tbody td:first-child,tbody td.lcell{text-align:left;font-weight:600}
tbody tr:hover{background:var(--surface2)}
.scroll-box{max-height:420px;overflow-y:auto}
.up{color:var(--red);font-weight:700}
.down{color:var(--blue);font-weight:700}
.flat{color:var(--muted)}
.bg-drop{background:var(--blue-l)!important}
.bg-warn{background:var(--amber-l)!important}

/* ── CHART CANVAS ───────────────────────────────────────────── */
.chart-box{position:relative;width:100%}
.subhead{font-size:.95rem;font-weight:700;margin:26px 0 10px;display:flex;align-items:center;gap:6px}
.divider{height:1px;background:var(--border);margin:26px 0}
.info{background:var(--surface2);border:1px dashed var(--border2);border-radius:12px;padding:24px;
  text-align:center;color:var(--muted);font-size:.84rem;margin-top:12px}
.metric{display:inline-block;font-size:.74rem;color:var(--muted);margin-bottom:10px}
.metric b{font-size:1.2rem;color:var(--text);font-weight:800;margin-right:4px}
.seg{display:inline-flex;background:var(--surface2);border-radius:9px;padding:3px;gap:2px;flex-wrap:wrap}
.seg button{border:none;background:transparent;padding:6px 12px;border-radius:7px;font-size:.78rem;font-weight:600;color:var(--muted)}
.seg button.on{background:var(--surface);color:var(--accent-d);box-shadow:var(--shadow)}
.loading{padding:60px;text-align:center;color:var(--muted)}
.spinner{width:30px;height:30px;border:3px solid var(--accent-l);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.banner{font-size:.74rem;padding:8px 12px;border-radius:9px;margin-top:14px;display:none}
.banner.warn{display:block;background:var(--amber-l);color:var(--amber);border:1px solid rgba(217,119,6,.2)}
.row-controls{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:18px 0 4px}
.ms-pop{position:relative}
.ms-list{position:absolute;z-index:30;top:100%;left:0;margin-top:4px;background:var(--surface);
  border:1px solid var(--border2);border-radius:10px;box-shadow:var(--shadow);padding:6px;max-height:240px;
  overflow-y:auto;min-width:200px;display:none}
.ms-list.open{display:block}
.ms-list label{display:flex;gap:7px;align-items:center;padding:5px 8px;border-radius:7px;font-size:.8rem;font-weight:500;cursor:pointer}
.ms-list label:hover{background:var(--surface2)}
.ms-list label{white-space:nowrap}
.ms-list label input[type="checkbox"]{width:auto;flex:0 0 auto;margin:0}
.ms-search{width:100%;padding:6px 8px;border:1px solid var(--border2);border-radius:7px;font-size:.78rem;margin-bottom:5px;outline:none}
.cap-note{font-size:.72rem;color:var(--muted);margin:6px 2px 0}
.rank-search{padding:8px 11px;border:1px solid var(--border2);border-radius:9px;font-size:.82rem;outline:none;min-width:240px;margin-bottom:8px}
.rank-search:focus{border-color:var(--accent)}
.dl-btn{border:1px solid var(--border2);background:var(--surface);color:var(--accent-d);padding:9px 15px;border-radius:9px;font-weight:700;font-size:.82rem}
.dl-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.dl-btn:hover{filter:brightness(.97)}
.r-up{color:var(--green)} .r-down{color:var(--red)}
</style>
</head>
<body>
<div class="app">
  <!-- ── SIDEBAR ── -->
  <nav class="sidebar">
    <div class="brand">💡<span>오즈키즈</span></div>
    <button class="nav-item active" data-page="weekly">📈<span class="lbl">주간 검색수</span></button>
    <button class="nav-item" data-page="trend">📊<span class="lbl">연간 트렌드</span></button>
    <button class="nav-item" data-page="shopping">🛒<span class="lbl">쇼핑검색 순위</span></button>
    <button class="nav-item" data-page="powerlink">🔗<span class="lbl">파워링크 순위</span></button>
    <button class="nav-item" data-page="blogcafe">📝<span class="lbl">블로그/카페 순위</span></button>
    <button class="nav-item" data-page="newkw">🆕<span class="lbl">신규키워드 개발</span></button>
    <button class="nav-item" data-page="manage">⚙️<span class="lbl">데이터 관리</span></button>
    <div class="sidebar-foot"><span class="dot"></span><span id="connState">로딩 중…</span></div>
  </nav>

  <!-- ── MAIN ── -->
  <main class="main">
    <div class="page-head">
      <h1>📊 오즈키즈 키워드 대시보드</h1>
      <div class="sub">브랜드: <b>오즈키즈</b> &nbsp;·&nbsp; 업데이트: <span id="updatedAt">—</span></div>
    </div>

    <!-- PAGE: 주간 검색수 -->
    <section id="page-weekly">
      <div class="filters">
        <div class="filter"><label>계절</label><div class="ms-pop" id="f-season"></div></div>
        <div class="filter"><label>카테고리</label><div class="ms-pop" id="f-category"></div></div>
        <div class="filter"><label>성별/나이</label><div class="ms-pop" id="f-gender"></div></div>
        <div class="filter"><label>🔎 키워드 검색</label><input id="f-search" placeholder="키워드명 입력..."></div>
      </div>
      <div id="weekly-body"><div class="loading"><div class="spinner"></div>데이터 불러오는 중…</div></div>
    </section>

    <section id="page-trend" hidden><div id="trend-body"></div></section>
    <section id="page-shopping" hidden><div id="shopping-body"></div></section>
    <section id="page-powerlink" hidden><div id="powerlink-body"></div></section>
    <section id="page-blogcafe" hidden><div id="blogcafe-body"></div></section>
    <section id="page-newkw" hidden><div id="newkw-body"></div></section>
    <section id="page-manage" hidden><div id="manage-body"></div></section>
  </main>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIG — 배포 후 Apps Script 웹앱 /exec URL 을 여기에 넣으세요.
   비워두면 내장 목업 데이터로 동작합니다(UI 미리보기용).
   ═══════════════════════════════════════════════════════════════ */
const CONFIG = {
  API_URL: "https://script.google.com/macros/s/AKfycbwxeD3Ofxr1r5Aq6ZZUmt64B48lVSeq757jh5r0wWJRf1T1tycMU6NN50p7odBgqw_xhw/exec",
};

const KST = "Asia/Seoul";
const META_COLS = new Set(["계절","복종","연령","성별","카테고리","대표키워드","키워드"]);
const fmt = n => (n==null||isNaN(n)) ? "-" : Math.round(n).toLocaleString("ko-KR");
const pct = v => (v==null||isNaN(v)) ? "-" : (v>0?"+":"")+v.toFixed(1)+"%";
// 주차 컬럼 라벨
//  - 이미 "범위"(하이픈 포함) 형식이면 그대로 (예: 2026.06.19-2026.06.25)
//  - 단일 날짜 D 면 "(D+1)~(D+7)" 주간 범위로 변환 (예: 2024.12.26 → 2024.12.27-2025.01.02)
//  - 날짜로 못 읽으면 원본 유지 (예: 2025-W20)
function _parseYMD(s){
  // 숫자 날짜: "2022. 10. 23." / "2024.1.17" / "2024.03.05" 등 (연도로 시작)
  const m=s.match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
  if(m && /^\d{4}/.test(s)) return {y:+m[1], mo:+m[2], d:+m[3]};
  // JS Date 문자열: "Sun Oct 23 2022 00:00:00 GMT+0900 (한국 표준시)"
  const dt=new Date(s);
  if(isNaN(dt.getTime())) return null;
  const p=new Intl.DateTimeFormat("en-CA",{timeZone:KST,year:"numeric",month:"2-digit",day:"2-digit"}).formatToParts(dt);
  const g=t=>+(p.find(x=>x.type===t)||{}).value;
  return {y:g("year"), mo:g("month"), d:g("day")};
}
function fmtWeek(h){
  const s=String(h).trim();
  if(!s) return s;
  if(s.includes("-")) return s;                 // 이미 범위 형식
  const p=_parseYMD(s);
  if(!p) return s;                              // 날짜 아님 → 원본
  const base=Date.UTC(p.y, p.mo-1, p.d);
  const f=ms=>{ const d=new Date(ms); return `${d.getUTCFullYear()}.${String(d.getUTCMonth()+1).padStart(2,"0")}.${String(d.getUTCDate()).padStart(2,"0")}`; };
  return f(base+864e5) + "-" + f(base+7*864e5); // D+1 ~ D+7
}

/* ── API ───────────────────────────────────────────────────── */
async function api(action, params={}){
  if(!CONFIG.API_URL) return MOCK[action] ?? null;
  const q = new URLSearchParams({action, ...params});
  const res = await fetch(`${CONFIG.API_URL}?${q}`);
  if(!res.ok) throw new Error("HTTP "+res.status);
  return res.json();
}
// 쓰기는 text/plain 으로 보내 CORS 프리플라이트 회피 (Apps Script doPost가 본문 JSON 파싱)
async function apiPost(body){
  if(!CONFIG.API_URL) throw new Error("API 미설정");
  const res = await fetch(CONFIG.API_URL, {method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify(body)});
  if(!res.ok) throw new Error("HTTP "+res.status);
  return res.json();
}

/* ── 네이버 검색광고 리포트 CSV 파서 (ad_rank_parser.py 포팅) ── */
function decodeBuf(buf){
  let t=new TextDecoder("utf-8").decode(buf);
  if(t.includes("�")){ try{ t=new TextDecoder("euc-kr").decode(buf); }catch(e){} }
  return t.replace(/^﻿/,"");
}
function csvLine(line){ const out=[];let cur="",q=false;
  for(let i=0;i<line.length;i++){const c=line[i];
    if(q){ if(c==='"'){ if(line[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else { if(c==='"')q=true; else if(c===","){out.push(cur);cur="";} else cur+=c; } }
  out.push(cur); return out; }
function csvParse(t){ return t.split(/\r\n|\n|\r/).filter(l=>l.length).map(csvLine); }
function findCol(H,cands){ const cl=H.map(h=>String(h).trim().replace(/\s/g,""));
  for(let i=0;i<cl.length;i++) if(cands.includes(cl[i])) return i;
  for(let i=0;i<cl.length;i++) for(const c of cands) if(cl[i].includes(c)) return i; return -1; }
function num(v){ const n=parseFloat(String(v==null?"":v).replace(/,/g,"").trim()); return isNaN(n)?0:n; }
function parseAdReport(rows, adType){
  if(rows.length<2) return {rows:[], week:""};
  const m=rows[0].join(" ").match(/(\d{4}\.\d{2}\.\d{2})\.?\s*~\s*(\d{4}\.\d{2}\.\d{2})/);
  const week=m?`${m[1]}-${m[2]}`:"";
  const H=rows[1];
  const ci={camp:findCol(H,["캠페인유형"]),media:findCol(H,["PC/모바일매체","PC/모바일","모바일매체"]),
    kw:findCol(H,["키워드"]),query:findCol(H,["검색어"]),rank:findCol(H,["평균노출순위","평균순위","노출순위","순위"])};
  const agg={};
  for(let r=2;r<rows.length;r++){ const row=rows[r]; if(!row||!row.length) continue;
    if(ci.media>=0 && !String(row[ci.media]||"").includes("모바일")) continue;
    if(ci.camp>=0 && String(row[ci.camp]||"").includes("플레이스")) continue;
    const kwIdx = adType==="shopping" ? (ci.query>=0?ci.query:ci.kw) : (ci.kw>=0?ci.kw:ci.query);
    const kw=String(row[kwIdx]||"").trim();
    if(!kw||kw==="nan"||kw==="-") continue;
    const rk=ci.rank>=0?num(row[ci.rank]):0;
    (agg[kw]=agg[kw]||{s:0,n:0}).s+=rk; agg[kw].n++;
  }
  return {rows:Object.keys(agg).map(kw=>({keyword:kw, avg_rank:Math.round(agg[kw].s/agg[kw].n*10)/10})), week};
}
function thisWeekLabel(){ // 월~일 (수집 라벨 기본값, 편집 가능)
  const f=t=>new Intl.DateTimeFormat("en-CA",{timeZone:KST,year:"numeric",month:"2-digit",day:"2-digit"}).format(t).replace(/-/g,".");
  const wd=new Intl.DateTimeFormat("en-US",{timeZone:KST,weekday:"short"}).format(new Date());
  const idx={Mon:0,Tue:1,Wed:2,Thu:3,Fri:4,Sat:5,Sun:6}[wd]||0;
  const mon=new Date(Date.now()-idx*864e5), sun=new Date(mon.getTime()+6*864e5);
  return `${f(mon)}-${f(sun)}`;
}

/* ── 데이터 모델: 키워드사전 {header, rows} → weekly/meta ────── */
function parseKeywordDict(kd){
  if(!kd || !kd.header || !kd.rows) return {weekly:[], weekCols:[], meta:{}};
  const H = kd.header;
  const kwIdx = H.indexOf("키워드") >= 0 ? H.indexOf("키워드") : 0;
  const weekColIdx = [];
  H.forEach((c,i)=>{ if(i!==kwIdx && !META_COLS.has(c)) weekColIdx.push(i); });
  const weekCols = weekColIdx.map(i=>fmtWeek(H[i]));
  const idx = name => H.indexOf(name);
  const sIdx=idx("계절"), cIdx=idx("카테고리"), gIdx=idx("성별"), aIdx=idx("연령");
  const seen=new Set(), weekly=[], meta={};
  for(const r of kd.rows){
    const kw = String(r[kwIdx]??"").trim();
    if(!kw || seen.has(kw)) continue;
    seen.add(kw);
    const rec = {keyword:kw};
    weekColIdx.forEach((ci,j)=>{
      const raw = String(r[ci]??"").replace(/,/g,"");
      rec[weekCols[j]] = raw==="" ? 0 : (parseInt(raw,10)||0);
    });
    weekly.push(rec);
    const gender = gIdx>=0 ? String(r[gIdx]??"").trim() : "";
    const age = aIdx>=0 ? String(r[aIdx]??"").trim() : "";
    let ga = (gender+"/"+age).replace(/^\/|\/$/g,"");
    if(ga==="/"||ga==="") ga="";
    meta[kw] = {
      season: sIdx>=0 ? String(r[sIdx]??"").trim() : "",
      category: cIdx>=0 ? String(r[cIdx]??"").trim() : "",
      gender: ga,
    };
  }
  return {weekly, weekCols, meta};
}

/* ── 계산: calc_changes ────────────────────────────────────── */
function calcChanges(rows, weekCols){
  if(weekCols.length<2) return rows.map(r=>({keyword:r.keyword, 이번주:null, 지난주:null, 변화량:null, 변화율:null}));
  const latest=weekCols[weekCols.length-1], prev=weekCols[weekCols.length-2];
  return rows.map(r=>{
    const cur=r[latest], pv=r[prev];
    const delta=cur-pv;
    const rate = pv>0 ? Math.round(delta/pv*1000)/10 : null;
    return {keyword:r.keyword, 이번주:cur, 지난주:pv, 변화량:delta, 변화율:rate};
  });
}

/* ── 필터: apply_filters ───────────────────────────────────── */
function applyFilters(rows){
  const {seasons, categories, genders, search} = FILTER;
  let out = rows.filter(r=>{
    const m = STATE.meta[r.keyword] || {};
    if(seasons.length && !seasons.some(s=> (m.season||"").includes(s))) return false;
    if(categories.length && !categories.includes(m.category)) return false;
    if(genders.length && !genders.includes(m.gender)) return false;
    return true;
  });
  if(search) out = out.filter(r=> r.keyword.toLowerCase().includes(search.toLowerCase()));
  return out;
}

/* ── 상태 ──────────────────────────────────────────────────── */
const STATE = {weekly:[], weekCols:[], meta:{}};
const FILTER = JSON.parse(localStorage.getItem("kw_filters")||"{}");
FILTER.seasons??=[]; FILTER.categories??=[]; FILTER.genders??=[]; FILTER.search="";
const charts = {};

/* ── 멀티셀렉트 드롭다운 ───────────────────────────────────── */
function buildMultiselect(host, options, selected, onChange){
  const CAP=80;
  host.innerHTML = `<input class="ms-head" readonly placeholder="전체" style="cursor:pointer">
    <div class="ms-list"><input class="ms-search" placeholder="🔎 검색..."><div class="ms-opts"></div></div>`;
  const head=host.querySelector(".ms-head"), list=host.querySelector(".ms-list"),
        search=host.querySelector(".ms-search"), opts=host.querySelector(".ms-opts");
  const renderHead=()=> head.value = selected.length ? `${selected.length}개 선택` : "";
  const renderOpts=()=>{
    const q=search.value.trim().toLowerCase();
    const arr = q ? options.filter(o=>o.toLowerCase().includes(q)) : options;
    const shown=arr.slice(0,CAP);
    opts.innerHTML = (shown.map(o=>`<label><input type="checkbox" value="${o}" ${selected.includes(o)?"checked":""}>${o}</label>`).join("")
      || `<div style="padding:8px;color:var(--muted)">결과 없음</div>`)
      + (arr.length>CAP?`<div style="padding:6px 8px;color:var(--muted);font-size:.7rem">…외 ${arr.length-CAP}개 · 검색으로 좁히세요</div>`:"");
    opts.querySelectorAll("input").forEach(cb=>cb.onchange=()=>{
      if(cb.checked) selected.push(cb.value); else selected.splice(selected.indexOf(cb.value),1);
      renderHead(); onChange();
    });
  };
  head.onclick=e=>{ e.stopPropagation(); document.querySelectorAll(".ms-list").forEach(l=>l!==list&&l.classList.remove("open")); list.classList.toggle("open"); if(list.classList.contains("open")) setTimeout(()=>search.focus(),0); };
  list.addEventListener("click", e=>e.stopPropagation());
  search.oninput=renderOpts;
  renderHead(); renderOpts();
}
document.addEventListener("click",()=>document.querySelectorAll(".ms-list").forEach(l=>l.classList.remove("open")));

  if(!STATE.weekly.length){ body.innerHTML=`<div class="info">아직 수집된 데이터가 없습니다. 주간 수집(GitHub Actions)이 먼저 실행되어야 합니다.</div>`; return; }

  const filtered = applyFilters(STATE.weekly);

  const nextSeason = NEXT_SEASON[curSeason];

    <div class="row-controls">
      <span style="font-weight:600;font-size:.8rem;color:var(--muted)">기간</span>
      <div class="seg" id="period-seg">
        <button data-p="recent2" class="on">최근 2주 비교</button>
        <button data-p="custom">직접 선택</button>

function renderPeriodSections(filtered, cols){
  const sub = filtered.map(r=>{ const o={keyword:r.keyword}; cols.forEach(c=>o[c]=r[c]); return o; });
  // 변화 비교: 첫 선택(지난주) vs 두 번째 선택(이번주). '최근 2주'면 두 컬럼이 곧 지난주/이번주.
  const first=cols[0], last=cols[cols.length-1];
  const ch = sub.map(r=>{
    const cur=r[last], pv=r[first], delta=cur-pv;
    const rate = pv>0 ? Math.round(delta/pv*1000)/10 : null;
    return {keyword:r.keyword, 이번주:cur, 지난주:pv, 변화량:delta, 변화율:rate};
  });
  const ranked = ch.filter(c=>c.변화율!=null);

  // 급상승/급하락
  const movers=document.getElementById("movers");
  if(ranked.length){
    const up=[...ranked].sort((a,b)=>b.변화량-a.변화량).slice(0,100);
    const down=[...ranked].sort((a,b)=>a.변화량-b.변화량).slice(0,100);
    const moverTbl=(rows)=>`<div class="tbl-wrap scroll-box"><table><thead><tr>
        <th class="lcell">키워드</th><th>이번주</th><th>지난주</th><th>변화량</th><th>변화율</th></tr></thead><tbody>
        ${rows.map(r=>`<tr><td class="lcell">${r.keyword}</td><td>${fmt(r.이번주)}</td><td>${fmt(r.지난주)}</td>
        <td class="${r.변화량>0?'up':r.변화량<0?'down':'flat'}">${r.변화량>0?'+':''}${fmt(r.변화량)}</td>
        <td class="${r.변화율>0?'up':r.변화율<0?'down':'flat'}">${pct(r.변화율)}</td></tr>`).join("")}</tbody></table></div>`;
    movers.innerHTML=`<div><div class="subhead">🔥 급상승 TOP 100</div>${moverTbl(up)}</div>
                      <div><div class="subhead">❄️ 급하락 TOP 100</div>${moverTbl(down)}</div>`;
  } else movers.innerHTML="";

  // 전체 데이터 (최신 주차가 왼쪽 → 과거가 오른쪽)
  const CAP=500, fShown=sub.slice(0,CAP);
  const dispCols=[...cols].reverse();
  document.getElementById("full-table").innerHTML=`<div class="tbl-wrap scroll-box"><table><thead><tr>
    <th class="lcell">키워드</th>${dispCols.map(c=>`<th>${c}</th>`).join("")}</tr></thead><tbody>
    ${fShown.map(r=>`<tr><td class="lcell">${r.keyword}</td>${dispCols.map(c=>`<td>${fmt(r[c])}</td>`).join("")}</tr>`).join("")}
    </tbody></table></div>${sub.length>CAP?`<div class="cap-note">전체 ${fmt(sub.length)}개 중 상위 ${CAP}개 표시 — 필터로 좁혀보세요.</div>`:""}`;
}

function drawBubble(ranked){
  const host=document.getElementById("bubble-host");
  let df = ranked.filter(c=>c.이번주>=5000 && c.변화율!=null);
  df = df.sort((a,b)=>b.이번주-a.이번주).slice(0,50);
  if(!df.length){ host.innerHTML=`<div class="info">조건에 맞는 키워드 없음 (이번주 검색수 5,000 이상 필요)</div>`; return; }
  host.innerHTML=`<div class="chart-box" style="height:480px"><canvas id="c-bubble"></canvas></div>`;
  const maxVol=Math.max(...df.map(d=>d.이번주));
  const data=df.map(d=>({x:d.이번주, y:d.변화율, r:Math.max(d.이번주/maxVol*40,5), kw:d.keyword, prev:d.지난주,
    bg: d.변화율>=0 ? `rgba(224,82,82,${Math.min(.4+Math.abs(d.변화율)/200,.95)})` : `rgba(59,125,224,${Math.min(.4+Math.abs(d.변화율)/200,.95)})`}));
  destroy("c-bubble");
  charts["c-bubble"]=new Chart(document.getElementById("c-bubble"),{
    type:"bubble",
    data:{datasets:[{data, backgroundColor:data.map(d=>d.bg), borderColor:"rgba(255,255,255,.7)", borderWidth:.5}]},
    options:{maintainAspectRatio:false, plugins:{legend:{display:false},
      datalabels:{color:"#1a1a1a",font:{size:9,weight:600},formatter:(v)=>v.kw,display:(ctx)=>ctx.dataset.data[ctx.dataIndex].r>14},
      tooltip:{callbacks:{label:(c)=>{const d=c.raw;return [`${d.kw}`,`이번주: ${fmt(d.x)}`,`지난주: ${fmt(d.prev)}`,`변화율: ${pct(d.y)}`];}}}},
      scales:{x:{title:{display:true,text:"이번주 검색수"},ticks:{callback:v=>fmt(v)}},
              y:{title:{display:true,text:"전주 대비 변화율 (%)"},grid:{color:(c)=>c.tick.value===0?"#999":"rgba(0,0,0,.05)"}}}},
    plugins:[ChartDataLabels]
  });
}

function drawTop10(filtered, weekCols){
  destroy("c-top10");
  if(!weekCols.length) return;
  const latest=weekCols[weekCols.length-1];
  const top=[...filtered].sort((a,b)=>b[latest]-a[latest]).slice(0,10); // 내림차순: 1위가 맨 위
  charts["c-top10"]=new Chart(document.getElementById("c-top10"),{
    type:"bar",
    data:{labels:top.map(t=>t.keyword),datasets:[{data:top.map(t=>t[latest]),
      backgroundColor:top.map((_,i)=>`rgba(91,79,212,${(.35+(top.length-1-i)/Math.max(top.length-1,1)*.55).toFixed(2)})`),borderRadius:5}]},
    options:{indexAxis:"y",maintainAspectRatio:false,plugins:{legend:{display:false},
      datalabels:{anchor:"end",align:"end",color:"var(--muted)",font:{size:10},formatter:v=>fmt(v)},
      tooltip:{callbacks:{label:c=>fmt(c.parsed.x)}}},
      scales:{x:{display:false,grace:"15%"},y:{ticks:{font:{size:11}}}}},
    plugins:[ChartDataLabels]
  });
}

function drawSeasonTransition(nextSeason, weekCols){
  destroy("c-season");

  const kws=Object.keys(STATE.meta).filter(k=>(STATE.meta[k].season||"").includes(nextSeason));
  if(!kws.length || weekCols.length<2){ host.innerHTML=`<div class="info">${nextSeason} 키워드 없음</div>`; return; }

  const sums=last4.map(c=> STATE.weekly.filter(r=>kws.includes(r.keyword)).reduce((s,r)=>s+(r[c]||0),0));
  charts["c-season"]=new Chart(document.getElementById("c-season"),{
    type:"line",
    data:{labels:last4,datasets:[{data:sums,borderColor:"#667eea",backgroundColor:"rgba(102,126,234,.1)",
      borderWidth:2.5,pointRadius:5,fill:true,tension:.3}]},
    options:{maintainAspectRatio:false,plugins:{legend:{display:false},datalabels:{display:false},
      tooltip:{callbacks:{label:c=>fmt(c.parsed.y)}}},scales:{y:{ticks:{callback:v=>fmt(v)}}}}
  });
}

function drawTrend(filtered, cols, picked){
  destroy("c-trend");
  const palette=["#7B6FE8","#E05252","#2DA882","#D97706","#3B7DE0","#C44FBE","#0EA5A5","#EC4899","#84CC16","#6366F1"];
  const datasets=picked.map((kw,i)=>{
    const row=filtered.find(r=>r.keyword===kw);
    return {label:kw,data:cols.map(c=>row?row[c]:null),borderColor:palette[i%palette.length],
      backgroundColor:palette[i%palette.length],borderWidth:2,pointRadius:3,tension:.25};
  });
  charts["c-trend"]=new Chart(document.getElementById("c-trend"),{
    type:"line",data:{labels:cols,datasets},
    options:{maintainAspectRatio:false,interaction:{mode:"index",intersect:false},
      plugins:{legend:{position:"bottom",labels:{boxWidth:12,font:{size:11}}},datalabels:{display:false},
      tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${fmt(c.parsed.y)}`}}},
      scales:{y:{ticks:{callback:v=>fmt(v)}}}}
  });
}

function isoWeek(dateStr){
  const d=new Date(String(dateStr).slice(0,10)+"T00:00:00Z");
  if(isNaN(d.getTime())) return null;
  const t=new Date(Date.UTC(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate()));
  const day=(t.getUTCDay()+6)%7; t.setUTCDate(t.getUTCDate()-day+3);
  const firstThu=new Date(Date.UTC(t.getUTCFullYear(),0,4));
  const fday=(firstThu.getUTCDay()+6)%7; firstThu.setUTCDate(firstThu.getUTCDate()-fday+3);
  return {year:t.getUTCFullYear(), week:1+Math.round((t-firstThu)/(7*864e5))};
}
function renderTableFromSheet(el, data, cap=300){
  const H=(data&&data.header)||[], rows=(data&&data.rows)||[];
  if(!rows.length){ el.innerHTML=`<div class="info">데이터 없음</div>`; return; }

    ${shown.map(r=>`<tr>${r.map(c=>`<td class="lcell">${c==null?"":c}</td>`).join("")}</tr>`).join("")}</tbody></table></div>${rows.length>cap?`<div class="cap-note">전체 ${fmt(rows.length)}건 중 상위 ${cap}건 표시.</div>`:""}`;
}

/* ── 연간 트렌드 ── */
async function renderTrend(){
  const body=document.getElementById("trend-body"); body.innerHTML=loadingHTML;
  let data; try{ data=await api("trend"); }catch(e){ body.innerHTML=`<div class="info">로드 실패: ${e.message}</div>`; return; }
  const rows=(data&&data.rows)||[], H=(data&&data.header)||[];
  const iDate=H.indexOf("date"), iKw=H.indexOf("keyword"), iVol=H.indexOf("estimated_weekly_volume");
  if(!rows.length||iDate<0||iKw<0){ body.innerHTML=`<div class="info">연간 트렌드 데이터가 없습니다. (기존 수집 도구의 '최신 데이터 수집' 실행 필요)</div>`; return; }
  const map={}, years=new Set(), totals={};
  rows.forEach(r=>{
    const kw=r[iKw], iso=isoWeek(r[iDate]); if(!iso||!kw) return;
    const vol=+String(r[iVol]).replace(/,/g,"")||0;
    map[kw]=map[kw]||{}; map[kw][iso.year]=map[kw][iso.year]||{}; map[kw][iso.year][iso.week]=vol;
    years.add(iso.year); totals[kw]=(totals[kw]||0)+vol;
  });
  const yrs=[...years].sort(); const curY=yrs[yrs.length-1], lastY=curY-1;
  const kws=Object.keys(map).sort((a,b)=>totals[b]-totals[a]);
  const annKw=String((STATE.settings&&STATE.settings.ann_keywords)||"").split(",").map(s=>s.trim()).filter(Boolean).filter(k=>kws.includes(k));
  const picked=annKw.length?annKw.slice(0,5):kws.slice(0,3);
  const lastCol=(STATE.settings&&STATE.settings.trend_last_collected)||"-";
  body.innerHTML=`
    <div class="card-title" style="margin-top:6px">📊 올해(${curY}) vs 작년(${lastY}) 주간 검색수 추이</div>
    <div style="font-size:.74rem;color:var(--muted);margin-bottom:10px">마지막 수집: ${lastCol} · 실선=올해, 점선=작년 · 같은 ISO 주차끼리 비교</div>
    <div class="ms-pop" id="trend2-pick" style="max-width:380px;margin-bottom:10px"></div>

function parseRank(data){
  const H=(data&&data.header)||[]; if(!H.length) return {weekCols:[],rows:[]};
  const iKw=H.indexOf("keyword"), iS=H.indexOf("계절"), iI=H.indexOf("품목");
  const metaIdx=new Set([iKw,iS,iI].filter(x=>x>=0)), weekIdx=[];
  H.forEach((c,i)=>{ if(!metaIdx.has(i)) weekIdx.push(i); });
  const weekCols=weekIdx.map(i=>H[i]);
  const rows=((data&&data.rows)||[]).map(r=>{
    const o={keyword:String(r[iKw]||"").trim(), item:iI>=0?(r[iI]||""):"", w:{}};
    weekIdx.forEach((ci,j)=>{ const v=r[ci]; o.w[weekCols[j]]=(v===""||v==null)?null:(+v); });
    return o;
  }).filter(o=>o.keyword);
  return {weekCols,rows};
}
